[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shipinfo-sdk"
version = "0.1.0"
description = "ShipInfo maritime analytics SDK for AI agents"
readme = "README.md"
requires-python = ">=3.9"
dependencies = ["httpx>=0.27.0"]
keywords = [
  "maritime",
  "shipping",
  "ais",
  "vessel-tracking",
  "port-congestion",
  "sts",
  "route-stress",
  "agent-native",
  "ai-agent-api",
  "x402",
  "pay-what-you-want"
]

[project.urls]
Homepage = "https://shipinfo.net/topos/for-agents"
Repository = "https://github.com/bifurcafe/shipinfo-topos"
Issues = "https://github.com/bifurcafe/shipinfo-topos/issues"

[tool.setuptools.packages.find]
where = ["."]

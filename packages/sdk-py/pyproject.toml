[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "shipinfo-sdk"
version = "0.1.0"
description = "ShipInfo agent-native Python SDK"
readme = "README.md"
requires-python = ">=3.9"
dependencies = ["httpx>=0.27.0"]

[tool.setuptools.packages.find]
where = ["."]
